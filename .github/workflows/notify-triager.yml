name: Get Changed Files in Last Commit

on:
  pull_request:
    types: [synchronize, opened, reopened]

jobs:
  get-changed-files:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v2

    - name: Get the last commit SHA
      id: get_last_commit
      run: echo "::set-output name=sha::$(git rev-parse HEAD)"

    - name: List files changed in the last commit
      run: |
        echo "Files changed in the last commit:"
        git diff-tree --no-commit-id --name-only -r ${{ steps.get_last_commit.outputs.sha }}